<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lab 5 - Cellular Automata</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      background: #ff2d9b;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      margin: 0;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 10px;
    }
    canvas {
      margin-top: 30px;
    }
    button {
      margin-top: 20px;
      padding: 10px 28px;
      font-size: 14px;
      background: transparent;
      color: white;
      border: 1px solid white;
      cursor: pointer;
    }
    button:hover {
      background: white;
      color: #ff2d9b;
    }
  </style>
</head>
<body>

  <h1>Cellular Automata Composition</h1>
  <button id="startBtn">Generate &amp; Play</button>
  <canvas id="grid"></canvas>

  <script>
    // ============================================================
    // GRID CONFIGURATION
    // ============================================================
    const CELL_SIZE = 20;
    const COLS = 40;
    const ROWS = 20;
    const GENERATIONS = 40;

    const canvas = document.getElementById('grid');
    canvas.width  = COLS * CELL_SIZE;
    canvas.height = ROWS * CELL_SIZE;
    const ctx = canvas.getContext('2d');

    // ============================================================
    // PENTATONIC SCALE FREQUENCIES
    // 20 notes, one per row — low at bottom, high at top
    // C D E G A repeated across 4 octaves
    // ============================================================
    const NOTES = [
      130.81, 146.83, 164.81, 196.00, 220.00, // octave 3
      261.63, 293.66, 329.63, 392.00, 440.00, // octave 4
      523.25, 587.33, 659.25, 783.99, 880.00, // octave 5
      1046.5, 1174.7, 1318.5, 1568.0, 1760.0  // octave 6
    ];

    // ============================================================
    // CREATE GRID
    // ============================================================
    function createGrid() {
      return Array.from({ length: ROWS }, () =>
        Array.from({ length: COLS }, () =>
          Math.random() < 0.3 ? 1 : 0
        )
      );
    }

    // ============================================================
    // COUNT NEIGHBORS (wraps around edges)
    // ============================================================
    function countNeighbors(grid, row, col) {
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const r = (row + dr + ROWS) % ROWS;
          const c = (col + dc + COLS) % COLS;
          count += grid[r][c];
        }
      }
      return count;
    }

    // ============================================================
    // ADVANCE ONE GENERATION
    // ============================================================
    function nextGeneration(grid) {
      return grid.map((row, r) =>
        row.map((cell, c) => {
          const neighbors = countNeighbors(grid, r, c);
          if (cell === 1) {
            return (neighbors === 2 || neighbors === 3) ? 1 : 0;
          } else {
            return neighbors === 3 ? 1 : 0;
          }
        })
      );
    }

    // ============================================================
    // RUN FULL SIMULATION, STORE EVERY GENERATION
    // ============================================================
    function runSimulation() {
      const history = [];
      let grid = createGrid();
      for (let i = 0; i < GENERATIONS; i++) {
        history.push(grid);
        grid = nextGeneration(grid);
      }
      return history;
    }

    // ============================================================
    // DRAW A SINGLE GENERATION
    // ============================================================
    function drawGrid(grid) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          ctx.fillStyle = grid[r][c] === 1 ? '#ffffff' : '#ff2d9b';
          ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
      }
    }

    // ============================================================
    // SCHEDULE AUDIO FOR THE ENTIRE SIMULATION
    //
    // How this works:
    // - Each generation = one "beat" in time
    // - BEAT_DURATION = how many seconds each beat lasts
    // - For each generation, we look at every row
    // - If that cell is ON (1), we schedule a note to play
    //   at exactly (startTime + generation * BEAT_DURATION)
    // - We use an oscillator for the tone and a GainNode to
    //   control volume and create a soft fade-out (envelope)
    // ============================================================
    function scheduleAudio(history, audioCtx) {
      const BEAT_DURATION = 0.12; // seconds per generation (matches 120ms visual)
      const NOTE_DURATION = 0.10; // how long each note rings (slightly shorter than beat)
      const startTime = audioCtx.currentTime + 0.05; // tiny delay so first beat isn't clipped

      history.forEach((grid, genIndex) => {
        // when does this generation's beat start?
        const beatTime = startTime + genIndex * BEAT_DURATION;

        grid.forEach((row, rowIndex) => {
          // we only care about the FIRST column of each generation
          // (each generation is one snapshot — column 0 is our "trigger")
          // Actually we read whether any cell in this row is alive
          // by checking the whole row — but for rhythm we just use
          // column 0 of each generation as the beat trigger per row
          if (grid[rowIndex][0] === 1) {
            // look up the frequency for this row
            // row 0 = lowest note, row 19 = highest note
            const frequency = NOTES[rowIndex];

            // --- OSCILLATOR ---
            // creates the actual tone at the given frequency
            const osc = audioCtx.createOscillator();
            osc.type = 'sine'; // sine = soft/pure tone (try 'square' for harsher retro sound)
            osc.frequency.value = frequency;

            // --- GAIN NODE (volume envelope) ---
            // we ramp the volume down over the note duration
            // so notes fade out instead of cutting off abruptly
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.15, beatTime);           // start at volume 0.15
            gain.gain.exponentialRampToValueAtTime(0.001, beatTime + NOTE_DURATION); // fade to near-zero

            // --- CONNECT THE CHAIN ---
            // oscillator → gain → speakers
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            // --- SCHEDULE START AND STOP ---
            osc.start(beatTime);
            osc.stop(beatTime + NOTE_DURATION);
          }
        });
      });
    }

    // ============================================================
    // DRAW FIRST GENERATION ON LOAD
    // ============================================================
    const history = runSimulation();
    drawGrid(history[0]);

    // ============================================================
    // BUTTON CLICK — RUN ANIMATION + AUDIO TOGETHER
    // ============================================================
    let animationInterval = null;
    let audioCtx = null;

    document.getElementById('startBtn').addEventListener('click', () => {
      // stop any existing animation
      if (animationInterval) {
        clearInterval(animationInterval);
        animationInterval = null;
      }

      // create AudioContext on first click (browsers require user gesture)
      // if it already exists, reuse it
      if (!audioCtx) {
        audioCtx = new AudioContext();
      }

      // resume in case browser suspended it
      audioCtx.resume();

      // run a fresh simulation
      const history = runSimulation();

      // schedule ALL the audio up front using Web Audio's precise clock
      scheduleAudio(history, audioCtx);

      // animate visually in sync (120ms matches BEAT_DURATION of 0.12s)
      let gen = 0;
      animationInterval = setInterval(() => {
        drawGrid(history[gen]);
        gen++;
        if (gen >= history.length) {
          clearInterval(animationInterval);
          animationInterval = null;
        }
      }, 120);
    });
  </script>

</body>
</html>
